  <style>
  .Inscription {
    background: 10px;

    justify-content: space-around;

    padding: 20px;
    display: block;

      body {
      margin: 0;
      font-family: Georgia, serif;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-around;
      background-color: #b26d44;
      padding: 15px 0;
    }

    .navbar a {
      text-decoration: none;
      color: black;
      font-size: 28px;
      position: relative;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #d28c5d;
      min-width: 180px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      z-index: 1;
      border-radius: 4px;
    }

    .dropdown-content a {
      display: block;
      padding: 10px;
      color: black;
      text-decoration: none;
      font-size: 20px;
    }

    .dropdown-content a:hover {
      background-color: #c07b4d;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown:hover > a {
      color: purple;
    }

    .navbar > a:hover {
      color: purple;
    }



  </style>
</head>
